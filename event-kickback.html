<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kickback in the Yard — Apr 18 | SPACEBOIFRESH</title>
  <meta name="description" content="RSVP for Kickback in the Yard Again with Spaceboifresh — April 18, Kickback Edition, 7PM–11PM." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void:       #050505;
      --void-2:     #0d0d0d;
      --void-3:     #141414;
      --glass:      rgba(255,255,255,0.04);
      --star:       #F8F9FA;
      --star-dim:   rgba(248,249,250,0.6);
      --purple:     #8A2BE2;
      --purple-dim: rgba(138,43,226,0.25);
      --orange:     #FF4500;
      --font-head:  'Syncopate', sans-serif;
      --font-body:  'Inter', sans-serif;
      --ease:       cubic-bezier(0.16,1,0.3,1);
    }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      background: var(--void);
      color: var(--star);
      font-family: var(--font-body);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 68px;
      background: rgba(5,5,5,0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      padding: 0 32px;
      justify-content: space-between;
    }

    .nav-logo {
      font-family: var(--font-head);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--star);
      text-decoration: none;
    }

    .nav-back {
      font-family: var(--font-head);
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--star-dim);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s ease;
    }
    .nav-back:hover { color: var(--star); }
    .nav-back svg { width: 12px; height: 12px; }

    /* MAIN */
    main {
      padding-top: 68px;
      max-width: 560px;
      margin: 0 auto;
      padding-bottom: 80px;
      padding-left: 24px;
      padding-right: 24px;
    }

    /* FLYER */
    .flyer-wrap {
      margin: 48px 0 40px;
      border: 1px solid rgba(138,43,226,0.3);
      box-shadow: 0 0 60px rgba(138,43,226,0.1);
    }

    .flyer-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* EVENT INFO */
    .event-info {
      margin-bottom: 40px;
    }

    .event-label {
      font-family: var(--font-head);
      font-size: 0.5rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--orange);
      display: block;
      margin-bottom: 12px;
    }

    .event-title {
      font-family: var(--font-head);
      font-size: clamp(1.2rem, 5vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--star);
      line-height: 1.1;
      margin-bottom: 20px;
    }

    .event-divider {
      width: 40px;
      height: 1px;
      background: var(--purple);
      margin-bottom: 20px;
    }

    .event-details {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .event-detail-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .event-detail-label {
      font-family: var(--font-head);
      font-size: 0.45rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--purple);
      min-width: 60px;
      padding-top: 2px;
    }

    .event-detail-value {
      color: var(--star);
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .event-detail-value .sub {
      display: block;
      color: var(--star-dim);
      font-size: 0.78rem;
    }

    /* FORM */
    .rsvp-section {
      background: #fff;
      border: 1px solid rgba(138,43,226,0.2);
      padding: 36px;
    }

    .rsvp-heading {
      font-family: var(--font-head);
      font-size: 0.6rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 6px;
    }

    .rsvp-subheading {
      font-size: 0.82rem;
      color: #444;
      margin-bottom: 28px;
    }

    /* ─── HUBSPOT FORM OVERRIDES ────────────────────────────── */
    .hs-form fieldset {
      max-width: 100%;
      border: none;
      padding: 0;
    }
    .hs-form .hs-form-field {
      margin-bottom: 18px;
    }
    .hs-form label {
      display: block;
      font-family: 'Syncopate', sans-serif;
      font-size: 0.45rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #F8F9FA;
      margin-bottom: 8px;
      font-weight: 400;
    }
    .hs-form input[type="text"],
    .hs-form input[type="email"],
    .hs-form input[type="tel"],
    .hs-form input[type="number"],
    .hs-form textarea,
    .hs-form select {
      width: 100%;
      background: #141414;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0;
      color: #F8F9FA;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      padding: 12px 16px;
      outline: none;
      box-shadow: none;
      transition: border-color 0.2s ease;
      -webkit-appearance: none;
      appearance: none;
    }
    .hs-form input[type="text"]:focus,
    .hs-form input[type="email"]:focus,
    .hs-form input[type="tel"]:focus,
    .hs-form textarea:focus,
    .hs-form select:focus {
      border-color: #8A2BE2;
    }
    .hs-form input::placeholder,
    .hs-form textarea::placeholder {
      color: rgba(248,249,250,0.25);
    }
    .hs-form .actions {
      padding: 0;
      margin-top: 4px;
    }
    .hs-form .hs-button {
      width: 100%;
      padding: 15px;
      background: #8A2BE2;
      border: none;
      border-radius: 0;
      color: #fff;
      font-family: 'Syncopate', sans-serif;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s ease;
      box-shadow: none;
    }
    .hs-form .hs-button:hover { opacity: 0.82; }
    .hs-form .hs-error-msgs {
      list-style: none;
      margin: 6px 0 0;
      padding: 0;
    }
    .hs-form .hs-error-msg {
      color: #FF4500;
      font-size: 0.7rem;
      font-family: 'Inter', sans-serif;
    }
    .hs-form .legal-consent-container,
    .hs-form .hs-richtext {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      color: rgba(248,249,250,0.35);
      line-height: 1.55;
    }
    .hs-form .legal-consent-container a,
    .hs-form .hs-richtext a { color: #8A2BE2; }
    .hs-form .submitted-message {
      font-family: 'Inter', sans-serif;
      color: #F8F9FA;
      font-size: 0.88rem;
      line-height: 1.65;
      padding: 8px 0;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 40px 24px;
      font-size: 0.7rem;
      color: rgba(248,249,250,0.25);
      font-family: var(--font-head);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    footer a {
      color: var(--purple);
      text-decoration: none;
    }

    @media (max-width: 480px) {
      nav { padding: 0 20px; }
      .rsvp-section { padding: 24px 20px; }
      main { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Spaceboifresh</a>
    <a href="index.html" class="nav-back">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path d="M7 2L3 6l4 4"/>
      </svg>
      Back
    </a>
  </nav>

  <main>

    <div class="flyer-wrap">
      <img
        src="event images/kick back.png"
        alt="Kickback in the Yard Again — April 18 with Spaceboifresh, Kickback Edition 7PM–11PM"
      />
    </div>

    <div class="event-info">
      <span class="event-label">Upcoming Event</span>
      <h1 class="event-title">Kickback in the Yard Again</h1>
      <div class="event-divider"></div>
      <div class="event-details">
        <div class="event-detail-row">
          <span class="event-detail-label">Date</span>
          <span class="event-detail-value">April 18, 2025</span>
        </div>
        <div class="event-detail-row">
          <span class="event-detail-label">Time</span>
          <span class="event-detail-value">7PM&ndash;11PM</span>
        </div>
        <div class="event-detail-row">
          <span class="event-detail-label">Vibe</span>
          <span class="event-detail-value">
            Kickback Edition
            <span class="sub">Good vibes, great people, good smoke.</span>
          </span>
        </div>
      </div>
    </div>

    <div class="rsvp-section">
      <p class="rsvp-heading">RSVP</p>
      <p class="rsvp-subheading">Lock in your spot. We'll see you there.</p>

      <script charset="utf-8" type="text/javascript" src="//js.hsforms.net/forms/v2.js"></script>
      <script>
        hbspt.forms.create({
          region: "na2",
          portalId: "245772595",
          formId: "9bacb343-fcef-42e6-9e79-a449e48969f1",
          target: "#hs-form-kickback",
          cssRequired: "",
          css: ""
        });
      </script>
      <div id="hs-form-kickback"></div>
    </div>

  </main>

  <footer>
    <a href="index.html">spaceboifresh.com</a>
  </footer>

</body>
</html>
